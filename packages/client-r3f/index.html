<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MaigeXR — React Three Fiber</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

    html, body, #root {
      width: 100%; height: 100%;
      background: #1a1a2e;
      font-family: system-ui, sans-serif;
    }

    /* ── Chat overlay ─────────────────────────────────────────────────────── */
    #chat-overlay {
      position: fixed; bottom: 20px; right: 20px; z-index: 100;
      width: 340px;
      background: rgba(15, 15, 30, 0.92);
      border: 1px solid rgba(100, 120, 200, 0.4);
      border-radius: 12px;
      overflow: hidden;
      transition: height 0.25s ease;
      height: 44px;
      display: flex; flex-direction: column;
      backdrop-filter: blur(12px);
    }
    #chat-overlay.expanded { height: 420px; }

    #chat-header {
      padding: 10px 14px; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      background: rgba(80, 100, 200, 0.2);
      user-select: none;
      font-size: 13px; font-weight: 600; color: #c8d4ff;
    }
    #chat-header:hover { background: rgba(80, 100, 200, 0.35); }

    #status {
      margin-left: auto;
      padding: 3px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 500;
    }
    #status.connected    { background: rgba(50,200,100,.25); color: #6effa0; }
    #status.connecting   { background: rgba(200,150,50,.25); color: #ffd080; }
    #status.disconnected { background: rgba(200,60,60,.25);  color: #ff9090; }

    #chat-messages {
      flex: 1; overflow-y: auto; padding: 10px 12px;
      display: flex; flex-direction: column; gap: 6px;
      scrollbar-width: thin;
    }
    .msg { font-size: 12.5px; line-height: 1.5; border-radius: 6px; padding: 6px 10px; }
    .msg.user     { background: rgba(80,120,255,.2); color: #c0d0ff; align-self: flex-end; }
    .msg.ai       { background: rgba(50,180,120,.15); color: #b0f0d0; align-self: flex-start; }
    .msg.ai-thinking { color: #8090b0; font-style: italic; align-self: flex-start; }
    .msg .sender  { font-weight: 700; opacity: .75; }

    #chat-input-row {
      display: flex; gap: 6px; padding: 8px 10px;
      border-top: 1px solid rgba(100,120,200,.2);
    }
    #chat-input {
      flex: 1; background: rgba(255,255,255,.07); border: 1px solid rgba(100,120,200,.3);
      border-radius: 8px; padding: 6px 10px; color: #d0d8ff; font-size: 13px;
      outline: none;
    }
    #chat-input:focus { border-color: rgba(100,150,255,.6); }
    #chat-send {
      background: rgba(80,120,255,.5); border: none; border-radius: 8px;
      padding: 6px 12px; color: #fff; cursor: pointer; font-size: 13px;
    }
    #chat-send:hover { background: rgba(80,120,255,.75); }

    .model-selector {
      display: flex;
      gap: 6px;
      padding: 6px 12px;
      border-bottom: 1px solid rgba(100,120,200,0.15);
      flex-shrink: 0;
    }

    .model-selector select {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(100,120,200,0.3);
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 11px;
      color: #c8d4ff;
      outline: none;
      cursor: pointer;
      min-width: 0;
    }

    .model-selector select:focus { border-color: rgba(100,150,255,.6); }

    .model-selector select option {
      background: #1a1a2e;
      color: #d0d8ff;
    }

    /* ── System prompt section ────────────────────── */
    #system-prompt-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid rgba(100,120,200,0.15);
      font-size: 11px;
      color: rgba(100,150,255,.8);
      font-weight: 600;
    }
    #system-prompt-toggle:hover { color: rgba(140,180,255,1); }

    #system-prompt-section {
      padding: 6px 12px 10px;
      border-bottom: 1px solid rgba(100,120,200,0.15);
      display: none;
    }

    #system-prompt {
      width: 100%;
      min-height: 80px;
      max-height: 200px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(100,120,200,0.3);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 11px;
      font-family: 'Cascadia Code', 'Fira Code', monospace, system-ui;
      color: #c8d4ff;
      outline: none;
      resize: vertical;
      line-height: 1.4;
    }
    #system-prompt:focus { border-color: rgba(100,150,255,.6); }

    .prompt-hint {
      font-size: 10px;
      color: #4b5563;
      margin-top: 4px;
    }

    /* ── Clear / action buttons ─────────────────── */
    #chat-action-row {
      display: flex;
      gap: 6px;
      padding: 4px 12px;
      border-bottom: 1px solid rgba(100,120,200,0.15);
      flex-shrink: 0;
    }
    #chat-action-row button {
      background: rgba(220,50,50,0.25);
      border: 1px solid rgba(220,80,80,0.4);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 11px;
      color: #ff9090;
      cursor: pointer;
      transition: background 0.2s;
    }
    #chat-action-row button:hover { background: rgba(220,50,50,0.45); }

    /* ── Debug panel ───────────────────────────── */
    #debug-panel {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 360px;
      background: rgba(8,8,20,0.95);
      border-right: 1px solid rgba(100,120,200,0.3);
      z-index: 200;
      overflow-y: auto;
      padding: 14px;
      font-size: 12px;
      font-family: 'Cascadia Code', 'Fira Code', monospace, system-ui;
      color: #c8d4ff;
      display: none;
      backdrop-filter: blur(12px);
      scrollbar-width: thin;
    }
    #debug-panel.visible { display: block; }
    #debug-panel h3 { color: rgba(100,150,255,.8); margin: 12px 0 6px; font-size: 13px; }
    #debug-panel h3:first-child { margin-top: 0; }
    #debug-panel pre {
      background: rgba(255,255,255,0.04);
      border-radius: 6px;
      padding: 8px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      font-size: 11px;
      line-height: 1.4;
    }
    #debug-panel .debug-hint {
      color: #506080;
      font-size: 10px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Chat overlay lives outside React so it's always on top -->
  <div id="chat-overlay">
    <div id="chat-header">
      <span>&#x1F4AC; MaigeXR AI</span>
      <span id="status" class="disconnected">Disconnected</span>
    </div>
    <div id="model-selector-row" class="model-selector" style="display:none">
      <select id="provider-select"></select>
      <select id="model-select"></select>
    </div>
    <div id="system-prompt-toggle">⚙ System Prompt ▾</div>
    <div id="system-prompt-section">
      <textarea id="system-prompt" spellcheck="false" placeholder="System prompt…"></textarea>
      <div class="prompt-hint">Ctrl+Enter or click away to save</div>
    </div>
    <div id="chat-action-row">
      <button id="clear-scene-btn">🗑 Clear Scene</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input id="chat-input" placeholder="Ask the AI… (Enter to send)" />
      <button id="chat-send">Send</button>
    </div>
  </div>

  <div id="debug-panel"></div>

  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
