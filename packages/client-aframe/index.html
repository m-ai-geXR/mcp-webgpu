<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>maige-3d — A-Frame</title>
    <!-- A-Frame Core -->
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <!-- A-Frame Extras for additional components -->
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.6.0/dist/aframe-extras.min.js"></script>
    <!-- A-Frame Effects for post-processing (bloom, etc.) -->
    <script src="https://unpkg.com/aframe-effects@5.0.0/dist/aframe-effects.min.js" onerror="console.warn('aframe-effects not loaded; using fallback bloom')"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #0d0d1a;
        overflow: hidden;
        font-family: 'Segoe UI', system-ui, sans-serif;
        color: #e0e0ff;
      }

      /* ── Status badge ─────────────────────────────────────────── */
      #status {
        position: fixed;
        top: 12px;
        left: 12px;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.05em;
        background: rgba(0,0,0,0.6);
        border: 1px solid #333;
        pointer-events: none;
        z-index: 10;
        transition: color 0.3s;
      }
      #status.connected    { color: #4ade80; border-color: #4ade80; }
      #status.disconnected { color: #f87171; border-color: #f87171; }
      #status.connecting   { color: #facc15; border-color: #facc15; }

      /* ── Chat overlay ─────────────────────────────────────────── */
      #chat-panel {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 340px;
        max-height: 480px;
        display: flex;
        flex-direction: column;
        background: rgba(10, 10, 28, 0.85);
        border: 1px solid rgba(100, 100, 220, 0.4);
        border-radius: 12px;
        backdrop-filter: blur(16px);
        z-index: 100;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0, 0, 80, 0.5);
        transition: height 0.2s ease, opacity 0.2s ease;
      }
      #chat-panel.collapsed { height: 44px; overflow: hidden; }

      #chat-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        cursor: pointer;
        user-select: none;
        border-bottom: 1px solid rgba(100,100,220,0.2);
        flex-shrink: 0;
      }
      #chat-header .dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #818cf8;
        flex-shrink: 0;
      }
      #chat-header span { font-size: 12px; font-weight: 600; color: #a5b4fc; flex: 1; }
      #chat-header .toggle-icon { font-size: 14px; color: #6366f1; transition: transform 0.2s; }
      #chat-panel:not(.collapsed) #chat-header .toggle-icon { transform: rotate(180deg); }

      #chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 10px 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        scrollbar-width: thin;
        scrollbar-color: #3730a3 transparent;
      }

      .chat-msg {
        padding: 7px 10px;
        border-radius: 8px;
        font-size: 13px;
        line-height: 1.5;
        max-width: 100%;
        word-break: break-word;
        animation: msgIn 0.15s ease;
      }
      @keyframes msgIn {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .chat-msg.user {
        background: rgba(79, 70, 229, 0.3);
        border: 1px solid rgba(99, 102, 241, 0.3);
        align-self: flex-end;
        color: #c7d2fe;
      }
      .chat-msg.ai {
        background: rgba(30, 30, 60, 0.7);
        border: 1px solid rgba(60, 60, 120, 0.4);
        align-self: flex-start;
        color: #e2e8f0;
      }
      .chat-msg.ai.thinking { color: #6b7280; font-style: italic; }

      #chat-input-row {
        display: flex;
        gap: 6px;
        padding: 10px 14px;
        border-top: 1px solid rgba(100,100,220,0.2);
        flex-shrink: 0;
      }
      #chat-input {
        flex: 1;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(99,102,241,0.3);
        border-radius: 8px;
        padding: 7px 10px;
        font-size: 13px;
        color: #e0e0ff;
        outline: none;
        transition: border-color 0.2s;
      }
      #chat-input:focus { border-color: #6366f1; }
      #chat-input::placeholder { color: #4b5563; }
      #chat-send {
        background: #4f46e5;
        border: none;
        border-radius: 8px;
        padding: 7px 12px;
        color: white;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.2s;
        flex-shrink: 0;
      }
      #chat-send:hover { background: #6366f1; }
      #chat-send:disabled { background: #374151; cursor: not-allowed; }

      .model-selector {
        display: flex;
        gap: 6px;
        padding: 6px 14px;
        border-bottom: 1px solid rgba(100,100,220,0.15);
        flex-shrink: 0;
      }

      .model-selector select {
        flex: 1;
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(99,102,241,0.3);
        border-radius: 6px;
        padding: 4px 6px;
        font-size: 11px;
        color: #c7d2fe;
        outline: none;
        cursor: pointer;
        min-width: 0;
      }

      .model-selector select:focus { border-color: #6366f1; }

      .model-selector select option {
        background: #1e1e3c;
        color: #e0e0ff;
      }

      /* ── System prompt section ────────────────────────────── */
      #system-prompt-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        cursor: pointer;
        user-select: none;
        border-bottom: 1px solid rgba(100,100,220,0.15);
        font-size: 11px;
        color: #818cf8;
        font-weight: 600;
      }
      #system-prompt-toggle:hover { color: #a5b4fc; }

      #system-prompt-section {
        padding: 6px 14px 10px;
        border-bottom: 1px solid rgba(100,100,220,0.15);
        display: none;
      }

      #system-prompt {
        width: 100%;
        min-height: 80px;
        max-height: 200px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(99,102,241,0.3);
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 11px;
        font-family: 'Segoe UI', system-ui, monospace;
        color: #c7d2fe;
        outline: none;
        resize: vertical;
        line-height: 1.4;
      }
      #system-prompt:focus { border-color: #6366f1; }

      .prompt-hint {
        font-size: 10px;
        color: #4b5563;
        margin-top: 4px;
      }

      /* ── Clear / action buttons ─────────────────────────── */
      #chat-action-row {
        display: flex;
        gap: 6px;
        padding: 4px 14px;
        border-bottom: 1px solid rgba(100,100,220,0.15);
        flex-shrink: 0;
      }
      #chat-action-row button {
        background: rgba(220,50,50,0.25);
        border: 1px solid rgba(220,80,80,0.4);
        border-radius: 6px;
        padding: 3px 10px;
        font-size: 11px;
        color: #f87171;
        cursor: pointer;
        transition: background 0.2s;
      }
      #chat-action-row button:hover { background: rgba(220,50,50,0.45); }

      /* ── Debug panel ─────────────────────────────────────── */
      #debug-panel {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        width: 360px;
        background: rgba(8,8,20,0.95);
        border-right: 1px solid rgba(100,100,220,0.3);
        z-index: 200;
        overflow-y: auto;
        padding: 14px;
        font-size: 12px;
        font-family: 'Cascadia Code', 'Fira Code', monospace, system-ui;
        color: #c7d2fe;
        display: none;
        backdrop-filter: blur(12px);
        scrollbar-width: thin;
      }
      #debug-panel.visible { display: block; }
      #debug-panel h3 { color: #818cf8; margin: 12px 0 6px; font-size: 13px; }
      #debug-panel h3:first-child { margin-top: 0; }
      #debug-panel pre {
        background: rgba(255,255,255,0.04);
        border-radius: 6px;
        padding: 8px;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-all;
        font-size: 11px;
        line-height: 1.4;
      }
      #debug-panel .debug-hint {
        color: #4b5563;
        font-size: 10px;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <!-- A-Frame scene — WebXR VR enabled -->
    <a-scene
      id="aframe-scene"
      effects="bloom"
      bloom="radius: 1.2; strength: 1.8; threshold: 0.1"
      background="color: #1a1a2e"
      fog="type: linear; color: #1a1a2e; near: 50; far: 200"
      shadow="type: pcfsoft; mapSize: 2048"
      vr-mode-ui="enabled: true"
      webxr="requiredFeatures: local-floor; optionalFeatures: hand-tracking, bounded-floor"
    >
      <!-- Assets -->
      <a-assets id="scene-assets"></a-assets>

      <!-- Default lighting (will be replaced by server commands) -->
      <a-entity id="light-ambient"  light="type: ambient;     color: #ffffff; intensity: 0.4"></a-entity>
      <a-entity id="light-dir"      light="type: directional; color: #ffffff; intensity: 0.8; castShadow: true"
                position="5 10 5"></a-entity>

      <!-- Grid removed — clean background only -->

      <!-- Camera rig with look-controls -->
      <a-entity id="camera-rig" position="6 5 6">
        <a-camera id="main-camera" look-controls wasd-controls>
          <a-cursor></a-cursor>
        </a-camera>
      </a-entity>

      <!-- VR controllers (visible only in VR) -->
      <a-entity id="left-hand"  laser-controls="hand: left"  raycaster="objects: [data-raycastable]; far: 10"></a-entity>
      <a-entity id="right-hand" laser-controls="hand: right" raycaster="objects: [data-raycastable]; far: 10"></a-entity>

      <!-- VR chat panel — floating text in VR space -->
      <a-entity id="vr-chat-panel" visible="false" position="0 1.5 -2">
        <a-plane width="1.4" height="0.9" color="#0a0a1e" opacity="0.9" shader="flat"></a-plane>
        <a-text id="vr-chat-text" value="🎮 VR Chat\nPress ~ to type…" color="#a5b4fc" width="2.4" position="-0.65 0.35 0.01" wrap-count="36" font="roboto"></a-text>
      </a-entity>
    </a-scene>

    <div id="status" class="connecting">● Connecting…</div>

    <!-- In-world Chat Overlay -->
    <div id="chat-panel" class="collapsed">
      <div id="chat-header">
        <div class="dot"></div>
        <span>AI Chat</span>
        <span class="toggle-icon">▲</span>
      </div>
      <div id="model-selector-row" class="model-selector" style="display:none">
        <select id="provider-select"></select>
        <select id="model-select"></select>
      </div>
      <div id="system-prompt-toggle">⚙ System Prompt ▾</div>
      <div id="system-prompt-section">
        <textarea id="system-prompt" spellcheck="false" placeholder="System prompt…"></textarea>
        <div class="prompt-hint">Ctrl+Enter or click away to save</div>
      </div>
      <div id="model-parameters-toggle" style="display: flex; align-items: center; gap: 6px; padding: 6px 14px; cursor: pointer; user-select: none; border-bottom: 1px solid rgba(100,100,220,0.15); font-size: 11px; color: #818cf8; font-weight: 600;">
        🎛 Model Parameters ▾
      </div>
      <div id="model-parameters-section">
        <div class="param-control">
          <div class="param-header">
            <span class="param-label">Temperature</span>
            <span class="param-value temp" id="temperature-value">0.7</span>
          </div>
          <input type="range" id="temperature-slider" class="param-slider temp"
                 min="0" max="2" step="0.1" value="0.7">
          <div class="param-hint">
            <span>0.0 - Focused</span>
            <span>2.0 - Creative</span>
          </div>
        </div>
        <div class="param-control">
          <div class="param-header">
            <span class="param-label">Top-p (Nucleus Sampling)</span>
            <span class="param-value topp" id="topp-value">0.9</span>
          </div>
          <input type="range" id="topp-slider" class="param-slider topp"
                 min="0.1" max="1.0" step="0.1" value="0.9">
          <div class="param-hint">
            <span>0.1 - Precise</span>
            <span>1.0 - Diverse</span>
          </div>
          <div class="param-description">Controls vocabulary diversity. Lower values focus on most likely words.</div>
        </div>
      </div>
      <div id="chat-action-row">
        <button id="clear-scene-btn">🗑 Clear Scene</button>
      </div>
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Ask the AI anything…" autocomplete="off" />
        <button id="chat-send">Send</button>
      </div>
    </div>

    <div id="debug-panel"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
